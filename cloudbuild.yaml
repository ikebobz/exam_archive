steps:
  # Step 1: Install dependencies
  - name: 'gcr.io/cloud-builders/npm'
    args: ['ci']
    dir: '.'

  # Step 2: Run TypeScript check (optional, for early failure)
  - name: 'gcr.io/cloud-builders/npm'
    args: ['run', 'check']
    dir: '.'

  # Step 3: Build the application (generates dist/)
  - name: 'gcr.io/cloud-builders/npm'
    args: ['run', 'build']
    dir: '.'

  # Step 4: Run database migrations
  - name: 'gcr.io/cloud-builders/npm'
    args: ['run', 'db:push']
    dir: '.'
    env:
      - 'DATABASE_URL=${DATABASE_URL}'  # Pass DB URL via substitution

  # Step 5: Deploy to Cloud Run from source (builds container automatically)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--source'
      - '.'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--set-env-vars'
      - 'FCM_SERVICE_KEY=$$FCM_SERVICE_KEY'
    secretEnv: ['FCM_SERVICE_KEY']

# Substitutions (define in trigger)
substitutions:
  _SERVICE_NAME: exam-vault  # Your Cloud Run service name
  _REGION: europe-west3
  _PROJECT_ID: project-6d216afb-169c-4b20-942  # Replace with your GCP project ID

# Secret Manager configuration
# Reference: https://cloud.google.com/build/docs/securing-builds/use-secrets
secrets:
  - versionName: projects/$_PROJECT_ID/secrets/fcm-service-key/versions/latest
    env: 'FCM_SERVICE_KEY'
         

options:
  logging: CLOUD_LOGGING_ONLY
steps:
  # Step 1: Install dependencies
  - name: 'gcr.io/cloud-builders/npm'
    args: ['ci']
    dir: '.'

  # Step 2: Run TypeScript check (optional, for early failure)
  - name: 'gcr.io/cloud-builders/npm'
    args: ['run', 'check']
    dir: '.'

  # Step 3: Build the application (generates dist/)
  - name: 'gcr.io/cloud-builders/npm'
    args: ['run', 'build']
    dir: '.'

  # Step 4: Deploy to Cloud Run from source (builds container automatically)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--source'
      - '.'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      # Add more as needed; use Secret Manager for secrets

# Substitutions (define in trigger)
substitutions:
  _SERVICE_NAME: exam-vault  # Your Cloud Run service name
  _REGION: europe-west3
  _DB_USER: exampro-user
  _DB_PASS: Vendetta@1983  # Use Secret Manager
  _DB_HOST: your-cloud-sql-instance
  _DB_NAME: exampro
  _SESSION_SECRET: vendetta  # Use Secret Manager
  _ADMIN_EMAIL: mcpikebobs@gmail.com
  _ADMIN_PASSWORD: vendetta  # Use Secret Manager

options:
  logging: CLOUD_LOGGING_ONLY